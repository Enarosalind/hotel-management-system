<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/support.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <ol>
                <li class="navbar-item"><a href="home.html">Home</a></li>
                <li class="navbar-item"><a href="reservation.html">Reservation</a></li>
                <li class="navbar-item"><a href="billing.html">Billing Page</a></li>
                <li class="navbar-item"><a href="history.html">History</a></li>
                <li class="navbar-item"><a href="bookings.html">Bookings</a></li>
                <li class="navbar-item"><a href="support.html" class="active">Contact Support</a></li>
            </ol>
        </nav>
    </header>

    <div class="container">
        <h1 id="container-hd">Contact Support</h1>
        
        <form id="support-box" action="#" method="post">
            <div class="form-group">
                <label for="issue-type">What can we help you with?</label>
                <select id="issue-type" required>
                    <option value="booking">Reservation & Booking Modification</option>
                    <option value="payment">Billing & Payment Failures</option>
                    <option value="account">Account & Security Settings</option>
                    <option value="other">Other / General Feedback</option>
                </select>
            </div>

            <div class="form-group">
                <label for="support-msg">Describe your issue</label>
                <textarea id="support-msg" placeholder="Type your message details here..." required></textarea>
            </div>

            <input type="submit" value="Submit Ticket">
        </form>
    </div>

    <script>
        document.getElementById('support-box').addEventListener('submit', function(event) {
            event.preventDefault();
            alert("Your support ticket has been received. Our team will get back to you within 24 hours!");
            document.getElementById('support-msg').value = '';
        });
    </script>
</body>
</html>
